name: Security Scan (SAST)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out your code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Install Semgrep CLI directly (skips the buggy GitHub integration wrapper)
      - name: Install Semgrep
        run: pipx install semgrep

      # Step 3: Run the scan and print results directly to the GitHub console
      - name: Run Semgrep Scan
        run: semgrep scan --config p/javascript --config p/default --error